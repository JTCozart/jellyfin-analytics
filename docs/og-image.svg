<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0e13"/>
      <stop offset="1" stop-color="#16202e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00a4dc"/>
      <stop offset="1" stop-color="#aa5cc3"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(0,164,220,.5)"/>
      <stop offset="1" stop-color="rgba(0,164,220,0)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <g transform="translate(80,90)">
    <rect width="64" height="64" rx="16" fill="url(#accent)"/>
    <g fill="#fff">
      <rect x="16" y="34" width="7" height="14" rx="2"/>
      <rect x="28" y="26" width="7" height="22" rx="2"/>
      <rect x="40" y="18" width="7" height="30" rx="2"/>
    </g>
    <text x="84" y="44" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" fill="#9aa6b6">Jellyfin plugin</text>
  </g>

  <text x="80" y="290" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="76" font-weight="700" fill="#e7ecf3">User Analytics</text>
  <text x="80" y="360" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="36" fill="#9aa6b6">Per-user playback stats, history &amp; charts</text>

  <!-- sample chart -->
  <g transform="translate(80,420)">
    <path d="M0,120 L80,108 L160,116 L240,80 L320,92 L400,54 L480,70 L560,34 L640,52 L720,18 L800,40 L880,10 L960,40 L1040,12 L1040,150 L0,150 Z" fill="url(#area)"/>
    <path d="M0,120 L80,108 L160,116 L240,80 L320,92 L400,54 L480,70 L560,34 L640,52 L720,18 L800,40 L880,10 L960,40 L1040,12" fill="none" stroke="#00a4dc" stroke-width="4"/>
  </g>

  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
