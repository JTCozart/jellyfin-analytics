name: '🚀 Release Plugin'

# Builds the plugin with JPRM (the official Jellyfin Plugin Repository Manager) and attaches
# the packaged plugin zip to the GitHub Release. Trigger by publishing a release whose tag is
# the plugin version, e.g. "v1.0.0.0" or "1.0.0.0".

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: 'Plugin version (e.g. 1.0.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install JPRM
        run: python -m pip install jprm

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          # strip a leading "v" if present
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build plugin package
        id: build
        run: |
          mkdir -p artifacts
          ZIP=$(jprm --verbosity=debug plugin build . \
            --version "${{ steps.ver.outputs.version }}" \
            --output ./artifacts)
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          ls -l ./artifacts

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-analytics-${{ steps.ver.outputs.version }}
          path: ./artifacts/*.zip

      - name: Attach package to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.zip
