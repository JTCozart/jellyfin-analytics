name: '🚀 Release Plugin'

# Builds the plugin with JPRM (the official Jellyfin Plugin Repository Manager), creates a
# GitHub Release for the pushed tag and attaches the packaged plugin zip to it.
#
# To cut a release, push a tag named after the plugin version, e.g.:
#   git tag v1.0.0.0 && git push origin v1.0.0.0
# (a leading "v" is optional and stripped). You can also run it manually from the Actions
# tab via workflow_dispatch.

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Plugin version (e.g. 1.0.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install JPRM
        run: python -m pip install jprm

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          # strip a leading "v" if present
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved plugin version: ${VERSION}"

      - name: Build plugin package
        id: build
        run: |
          mkdir -p artifacts
          ZIP=$(jprm --verbosity=debug plugin build . \
            --version "${{ steps.ver.outputs.version }}" \
            --output ./artifacts)
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          ls -l ./artifacts

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-analytics-${{ steps.ver.outputs.version }}
          path: ./artifacts/*.zip

      - name: Create release and attach package
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: User Analytics ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: ./artifacts/*.zip
